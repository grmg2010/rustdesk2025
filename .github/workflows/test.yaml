name: Flutter Build für Windows

on:
  workflow_dispatch:    # manuell startbar
  push:                 # oder bei jedem Push ins Repo

jobs:
  build-windows:
    runs-on: self-hosted

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Flutter Version prüfen
        run: flutter --version
        shell: cmd

      - name: Abhängigkeiten holen
        run: flutter pub get
        shell: cmd

      - name: Windows Build ausführen
        run: flutter build windows
        shell: cmd

      - name: EXE anzeigen
        run: dir build\windows\runner\Release
        shell: cmd

      - name: EXE als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: build/windows/runner/Release/*.exe
